<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 Game Store</h1>
            <p>Manage your game collection</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab(event, 'games')">Games</button>
            <button class="tab-btn" onclick="switchTab(event, 'genres')">Genres</button>
        </div>

        <!-- Games Tab -->
        <div id="games" class="tab-content active">
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">Add New Game</h2>
                <form id="gameForm" onsubmit="addGame(event)">
                    <div class="form-group">
                        <label for="gameTitle">Game Title *</label>
                        <input type="text" id="gameTitle" required>
                    </div>

                    <div class="two-column">
                        <div class="form-group">
                            <label for="gameGenre">Genre *</label>
                            <select id="gameGenre" required>
                                <option value="">Select a genre...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="gamePrice">Price ($) *</label>
                            <input type="number" id="gamePrice" step="0.01" min="0" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="gameReleaseDate">Release Date *</label>
                        <input type="date" id="gameReleaseDate" required>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary">Add Game</button>
                        <button type="reset" class="btn-secondary">Clear</button>
                    </div>
                </form>
            </div>

            <div id="gamesContainer" style="margin-top: 30px;">
                <h2 style="margin-bottom: 20px; color: white;">Games Library</h2>
                <div class="games-grid" id="gamesList"></div>
            </div>
        </div>

        <!-- Genres Tab -->
        <div id="genres" class="tab-content">
            <div class="card">
                <h2 style="margin-bottom: 20px; color: #333;">Add New Genre</h2>
                <form id="genreForm" onsubmit="addGenre(event)">
                    <div class="form-group">
                        <label for="genreName">Genre Name *</label>
                        <input type="text" id="genreName" required placeholder="e.g., Action, RPG, Strategy...">
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-primary">Add Genre</button>
                        <button type="reset" class="btn-secondary">Clear</button>
                    </div>
                </form>
            </div>

            <div style="margin-top: 30px;">
                <h2 style="margin-bottom: 20px; color: white;">All Genres</h2>
                <div class="genre-grid" id="genresList"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
